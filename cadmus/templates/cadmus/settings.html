{% extends 'cadmus/layout.html' %}

{% block title %}
Settings | Cadmus - Personal Diary
{% endblock %}

{% block body %}

  <a class="button is-danger is-light" style="margin-left:2%;margin-top:1%;" href="{% url 'cadmus:index' %}">&#8592 Back to home</a>

<h1 class="title is-3 has-text-centered">Settings</h1>

<div class="settings-list">
    <a href="{% url 'cadmus:username_change' %}" class="settings-item">
        <span class="settings-item-label">Change username</span>
        <span class="settings-item-arrow">→</span>
    </a>
    <div class="settings-item settings-item-disabled">
        <span class="settings-item-label">Change email</span>
        <span class="settings-item-muted">Coming soon</span>
    </div>
    <a href="{% url 'cadmus:password_recover' %}" class="settings-item">
        <span class="settings-item-label">Change password</span>
        <span class="settings-item-arrow">→</span>
    </a>
</div>
<br>
{% endblock %}
